<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - Instagram AI Marketing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">Instagram AI Marketing</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/dashboard">대시보드</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>대시보드</h1>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">콘텐츠 생성</h5>
                        <p class="card-text">AI를 활용한 콘텐츠를 생성합니다.</p>
                        <button class="btn btn-primary">생성하기</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">스케줄링</h5>
                        <p class="card-text">포스팅 일정을 관리합니다.</p>
                        <button class="btn btn-primary">관리하기</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">분석</h5>
                        <p class="card-text">성과를 분석합니다.</p>
                        <button class="btn btn-primary">보기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
